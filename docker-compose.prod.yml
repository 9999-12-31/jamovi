version: '3.8'

services:
  jamovi:
    image: ghcr.io/9999-12-31/jamovi:latest
    container_name: jamovi
    ports:
      - '41337:41337'
    command: ['python3', '-u', '-m', 'jamovi.server', '41337', '--if=*']
    stdin_open: true
    stop_grace_period: 0.1s
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python3', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:41337/version")']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      JAMOVI_HOSTNAME: '0.0.0.0'
      JAMOVI_ALLOW_ARBITRARY_CODE: 'false'
      JAMOVI_HOST_A: 'localhost:41337'
      JAMOVI_HOST_B: 'localhost:41338'
      JAMOVI_HOST_C: 'localhost:41339'
      JAMOVI_ACCESS_KEY: ''
      # 模块库权限控制
      JAMOVI_PERMISSIONS_LIBRARY_BROWSEABLE: '0'
      JAMOVI_PERMISSIONS_LIBRARY_ADD_REMOVE: '1'
      JAMOVI_PERMISSIONS_LIBRARY_SHOW_HIDE: '1'
      JAMOVI_PERMISSIONS_LIBRARY_SIDE_LOAD: '1'
    volumes:
      - ./documents:/root/Documents
    networks:
      - jamovi-net

networks:
  jamovi-net:
    driver: bridge
