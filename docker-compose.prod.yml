services:
  jamovi:
    image: harbor.bigdata.com/public/jamovi:latest  # 镜像地址
    container_name: jamovi                          # 容器名称
    ports:
      - '41337:41337'  # 主端口
      - '41338:41338'  # 分析端口1
      - '41339:41339'  # 分析端口2
    command: ["/usr/bin/python3 -u -m jamovi.server 41337 --if=*"]  # 启动命令
    stdin_open: true                         # 保持STDIN打开
    stop_grace_period: 0.1s                 # 快速停止容器
    restart: unless-stopped                 # 除非手动停止，否则自动重启
    environment:
      JAMOVI_ALLOW_ARBITRARY_CODE: 'false'       # 是否允许执行任意R代码，false禁用更安全，防止代码注入攻击
      JAMOVI_HOST_A: '10.110.177.130:41337'     # 主服务外部访问地址
      JAMOVI_HOST_B: '10.110.177.130:41338'     # 分析服务1外部访问地址
      JAMOVI_HOST_C: '10.110.177.130:41339'     # 分析服务2外部访问地址
      JAMOVI_ACCESS_KEY: ''                      # 访问密钥，留空禁用认证，设置后需要通过?access_key=xxx访问
      # 模块库权限控制
      # permissions_library_browseable: '1'    # 启用在线模块库浏览（显示"可用"tab，允许浏览jamovi官方模块库）
      permissions_library_browseable: '0'      # 禁用在线模块库浏览，只显示已安装和Sideload两个tab
      permissions_library_add_remove: '1'      # 启用安装卸载模块（已安装模块可以卸载）
      permissions_library_show_hide: '1'       # 启用显示隐藏模块（用户可控制模块是否在分析菜单栏显示）
      permissions_library_side_load: '1'       # 启用从本地上传模块（允许用户本地上传.jmvmodule文件安装）
      # 数据集大小限制（仅云端模式生效）
      permissions_max_rows: '50000'            # 最大行数限制，默认10000，这里放宽到5万行
      permissions_max_columns: '200'           # 最大列数限制，默认100，这里放宽到200列
    volumes:
      - ./documents:/root/Documents  # 文档持久化存储目录
    networks:
      - jamovi-net  # 使用自定义桥接网络

networks:
  jamovi-net:
    driver: bridge  # 使用桥接网络模式
